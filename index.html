<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>减脂打卡 - 一起加油</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="loadingOverlay" style="
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
    ">
        <div style="
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        "></div>
        <p style="color: white; font-size: 18px; font-weight: bold;">正在加载...</p>
        <p id="loadingStatus" style="color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 10px;">连接服务器中...</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <div class="container">
            <h1><i class="fas fa-heartbeat"></i> 减脂打卡</h1>
            <p class="subtitle">和朋友一起，见证更好的自己</p>
            <div class="user-switch">
                <span>当前用户：</span>
                <div class="user-btn-group">
                    <input type="text" id="user1Name" class="user-name-input" value="用户A" maxlength="10" onclick="switchUser('user1')">
                </div>
                <div class="user-btn-group">
                    <input type="text" id="user2Name" class="user-name-input" value="用户B" maxlength="10" onclick="switchUser('user2')">
                </div>
                <button id="logoutBtn" class="logout-btn" onclick="logout()" title="退出登录并清除本地数据">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            <div class="date-selector">
                <button id="prevDayBtn" class="date-nav-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
                <input type="date" id="datePicker" class="date-picker" onchange="onDateChange()">
                <button id="nextDayBtn" class="date-nav-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
                <button id="todayBtn" class="today-btn" onclick="goToToday()">今天</button>
            </div>
            <div class="current-date" id="currentDate">2026-07-21 星期二</div>
            <div class="user-id" id="userIdDisplay" style="font-size: 12px; color: #fff; opacity: 0.7; margin-top: 5px;">正在登录...</div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="diet">饮食打卡</button>
            <button class="tab-btn" data-tab="exercise">运动打卡</button>
            <button class="tab-btn" data-tab="summary">今日总结</button>
            <button class="tab-btn" data-tab="friend">朋友动态</button>
            <button class="tab-btn" data-tab="history">历史记录</button>
        </nav>

        <main>
            <section id="diet" class="tab-content active">
                <h2><i class="fas fa-utensils"></i> 今日饮食</h2>
                <div class="meal-cards">
                    <div class="meal-card" id="breakfast">
                        <h3><i class="fas fa-sun"></i> 早餐</h3>
                        <div class="meal-content" id="breakfastContent"></div>
                        <button class="add-btn" onclick="addMeal('breakfast')">添加</button>
                    </div>
                    <div class="meal-card" id="lunch">
                        <h3><i class="fas fa-sun"></i> 午餐</h3>
                        <div class="meal-content" id="lunchContent"></div>
                        <button class="add-btn" onclick="addMeal('lunch')">添加</button>
                    </div>
                    <div class="meal-card" id="dinner">
                        <h3><i class="fas fa-moon"></i> 晚餐</h3>
                        <div class="meal-content" id="dinnerContent"></div>
                        <button class="add-btn" onclick="addMeal('dinner')">添加</button>
                    </div>
                    <div class="meal-card" id="snack">
                        <h3><i class="fas fa-cookie-bite"></i> 加餐</h3>
                        <div class="meal-content" id="snackContent"></div>
                        <button class="add-btn" onclick="addMeal('snack')">添加</button>
                    </div>
                </div>
            </section>

            <section id="exercise" class="tab-content">
                <h2><i class="fas fa-dumbbell"></i> 今日运动</h2>
                <div class="exercise-list" id="exerciseList"></div>
                <button class="add-exercise-btn" onclick="addExercise()">添加运动</button>
            </section>

            <section id="summary" class="tab-content">
                <h2><i class="fas fa-chart-line"></i> 今日总结</h2>
                <div class="summary-cards">
                    <div class="summary-card">
                        <h3>摄入热量</h3>
                        <p class="summary-value" id="caloriesIn">0</p>
                        <p class="summary-unit">千卡</p>
                    </div>
                    <div class="summary-card">
                        <h3>消耗热量</h3>
                        <p class="summary-value" id="caloriesOut">0</p>
                        <p class="summary-unit">千卡</p>
                    </div>
                    <div class="summary-card">
                        <h3>净热量</h3>
                        <p class="summary-value" id="netCalories">0</p>
                        <p class="summary-unit">千卡</p>
                    </div>
                </div>
                <div class="progress-section">
                    <h3>目标进度</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p class="progress-text" id="progressText">距离目标还差 500 千卡</p>
                </div>
            </section>

            <section id="friend" class="tab-content">
                <h2><i class="fas fa-users"></i> 朋友动态</h2>
                <div class="friend-content" id="friendContent"></div>
            </section>

            <section id="history" class="tab-content">
                <h2><i class="fas fa-history"></i> 历史记录汇总</h2>
                <div class="history-tabs">
                    <button class="history-tab active" data-period="week">本周</button>
                    <button class="history-tab" data-period="month">本月</button>
                    <button class="history-tab" data-period="year">本年</button>
                </div>
                <div class="history-date-range" id="historyDateRange"></div>
                <div class="history-summary">
                    <div class="history-card">
                        <h3><i class="fas fa-calendar-check"></i> 打卡天数</h3>
                        <p class="history-value" id="historyDays">0</p>
                    </div>
                    <div class="history-card">
                        <h3><i class="fas fa-utensils"></i> 总摄入</h3>
                        <p class="history-value" id="historyCaloriesIn">0</p>
                        <p class="history-unit">千卡</p>
                    </div>
                    <div class="history-card">
                        <h3><i class="fas fa-burn"></i> 总消耗</h3>
                        <p class="history-value" id="historyCaloriesOut">0</p>
                        <p class="history-unit">千卡</p>
                    </div>
                    <div class="history-card">
                        <h3><i class="fas fa-chart-line"></i> 平均每日净热量</h3>
                        <p class="history-value" id="historyNetAvg">0</p>
                        <p class="history-unit">千卡</p>
                    </div>
                </div>
                <div class="history-chart">
                    <h3>每日摄入热量趋势</h3>
                    <div class="chart-container">
                        <canvas id="caloriesChart"></canvas>
                    </div>
                </div>
                <div class="history-detail">
                    <h3>详细记录</h3>
                    <div class="detail-list" id="detailList"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="mealModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('mealModal')">&times;</span>
            <h3>添加饮食</h3>
            <input type="text" id="mealName" placeholder="食物名称">
            <div class="weight-input-group">
                <input type="number" id="mealWeight" placeholder="重量（克）" min="1">
                <span class="weight-unit">克</span>
            </div>
            <div id="snackCaloriesInput" style="display: none;">
                <div class="manual-calories-group">
                    <input type="checkbox" id="manualCalories" onchange="toggleManualCalories()">
                    <span>手动输入卡路里</span>
                </div>
                <input type="number" id="mealCalories" placeholder="每百克热量（kj）" min="1" style="display: none;">
            </div>
            <input type="file" id="mealImage" accept="image/*" onchange="previewImage('mealImage', 'mealPreview')">
            <img id="mealPreview" class="preview-image" src="" alt="预览">
            <button onclick="saveMeal()">保存</button>
        </div>
    </div>

    <div id="exerciseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('exerciseModal')">&times;</span>
            <h3>添加运动</h3>
            <select id="exerciseType">
                <option value="">选择运动类型</option>
                <option value="running">跑步</option>
                <option value="cycling">骑行</option>
                <option value="swimming">游泳</option>
                <option value="yoga">瑜伽</option>
                <option value="weights">力量训练</option>
                <option value="cardio">有氧操</option>
                <option value="basketball">篮球</option>
                <option value="badminton">羽毛球</option>
                <option value="other">其他</option>
            </select>
            <input type="number" id="exerciseDuration" placeholder="时长（分钟）">
            <textarea id="exerciseDesc" placeholder="运动描述"></textarea>
            <input type="file" id="exerciseImage" accept="image/*" onchange="previewImage('exerciseImage', 'exercisePreview')">
            <img id="exercisePreview" class="preview-image" src="" alt="预览">
            <button onclick="saveExercise()">保存</button>
        </div>
    </div>

    <script type="module">
        let firebaseApp = null;
        let db = null;
        let auth = null;
        let firebaseLoaded = false;
        
        async function loadFirebase() {
            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js");
                const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js");
                const { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, onSnapshot } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
                
                window.initializeApp = initializeApp;
                window.getAuth = getAuth;
                window.signInAnonymously = signInAnonymously;
                window.getFirestore = getFirestore;
                window.collection = collection;
                window.doc = doc;
                window.setDoc = setDoc;
                window.getDoc = getDoc;
                window.getDocs = getDocs;
                window.query = query;
                window.where = where;
                window.onSnapshot = onSnapshot;
                
                firebaseLoaded = true;
                console.log('Firebase SDK加载成功');
            } catch (error) {
                console.error('Firebase SDK加载失败:', error);
                firebaseLoaded = false;
            }
        }
        
        loadFirebase().then(() => {
            if (firebaseLoaded) {
                const firebaseConfig = {
                    apiKey: "AIzaSyDa7AaaY7jbOLGYzbZqmJCSVq2gBmK4Xmw",
                    authDomain: "chelsea-lose-weight.firebaseapp.com",
                    projectId: "chelsea-lose-weight",
                    storageBucket: "chelsea-lose-weight.firebasestorage.app",
                    messagingSenderId: "67583269783",
                    appId: "1:67583269783:web:7c6aea0c7d44b8b6a00d2",
                    measurementId: "G-4SPEC4QKQN"
                };
                
                firebaseApp = window.initializeApp(firebaseConfig);
                db = window.getFirestore(firebaseApp);
                auth = window.getAuth(firebaseApp);
                console.log('Firebase初始化成功');
            }
            initApp();
        }).catch(() => {
            initApp();
        });

            '肉类': {'鸡胸肉': 165, '鸡腿肉': 198, '瘦牛肉': 105, '肥牛肉': 330, '瘦猪肉': 143, '肥猪肉': 615, '羊肉': 203, '鸭肉': 180, '鹅肉': 245, '兔肉': 102, '驴肉': 116, '狗肉': 116},

            '蛋类': {'鸡蛋': 143, '鸡蛋白': 60, '鸭蛋': 180, '鹅蛋': 190, '鹌鹑蛋': 160},
            '主食类': {'白饭': 116, '糙米饭': 111, '燕麦': 389, '玉米': 106, '红薯': 86, '土豆': 77, '面条': 285, '全麦面包': 260, '白面包': 280, '馒头': 286, '包子': 250, '饺子': 280, '粽子': 340, '汤圆': 250},
            '豆制品': {'豆腐': 70, '豆浆': 14, '腐竹': 450, '豆干': 150, '红豆': 300, '绿豆': 290, '黄豆': 390, '黑豆': 380},
            '坚果类': {'核桃': 654, '杏仁': 575, '腰果': 553, '花生': 567, '芝麻': 530, '瓜子': 550, '开心果': 614, '碧根果': 670, '夏威夷果': 718, '榛子': 628},
            '饮料类': {'白开水': 0, '矿泉水': 0, '绿茶': 1, '红茶': 1, '咖啡': 1, '奶茶': 120, '可乐': 43, '果汁': 55, '牛奶': 64, '酸奶': 80, '豆浆': 14},
            '零食类': {'薯片': 536, '巧克力': 539, '饼干': 450, '糖果': 400, '果冻': 100, '方便面': 473, '火腿肠': 210, '牛肉干': 450, '海苔': 350, '话梅': 350}
        };

        for (const category in foodDatabase) {
            for (const food in foodDatabase[category]) {
                foodCalories[food] = foodDatabase[category][food];
            }
        }

        let currentUser = 'user1';
        let currentMealType = '';
        let currentHistoryPeriod = 'week';
        let currentUid = null;
        let isReadOnlyMode = false;
        let myLocalUser = 'user1';
        let selectedDate = getTodayString();
        
        function hideLoading() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 500);
            }
        }
        
        function getTodayString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }
        
        function formatDateWithWeek(dateStr) {
            const date = new Date(dateStr);
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return `${dateStr} ${weekDays[date.getDay()]}`;
        }
        
        function onDateChange() {
            const datePicker = document.getElementById('datePicker');
            const newDate = datePicker.value;
            if (newDate && newDate !== selectedDate) {
                selectedDate = newDate;
                loadDateData();
            }
        }
        
        function changeDate(delta) {
            const date = new Date(selectedDate);
            date.setDate(date.getDate() + delta);
            const newDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            selectedDate = newDate;
            document.getElementById('datePicker').value = newDate;
            loadDateData();
        }
        
        function goToToday() {
            selectedDate = getTodayString();
            document.getElementById('datePicker').value = selectedDate;
            loadDateData();
        }
        
        async function loadDateData() {
            document.getElementById('currentDate').textContent = formatDateWithWeek(selectedDate);
            const today = getTodayString();
            const isHistory = selectedDate !== today;
            
            if (isHistory && currentUid) {
                await loadHistoryDateData(selectedDate);
            } else if (currentUid) {
                await loadFromFirestore();
            } else {
                updateAllContent();
            }
        }
        
        async function loadHistoryDateData(date) {
            if (!db || !currentUid) { updateAllContent(); return; }
            try {
                const docId = `${currentUid}_${currentUser}_${date}`;
                const docRef = doc(db, 'history', docId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    dailyData[currentUser] = {
                        meals: data.meals || {breakfast: [], lunch: [], dinner: [], snack: []},
                        exercises: data.exercises || []
                    };
                } else {
                    dailyData[currentUser] = { meals: {breakfast: [], lunch: [], dinner: [], snack: []}, exercises: [] };
                }
                
                const friendUser = currentUser === 'user1' ? 'user2' : 'user1';
                const friendDocId = `${currentUid}_${friendUser}_${date}`;
                const friendDocRef = doc(db, 'history', friendDocId);
                const friendDocSnap = await getDoc(friendDocRef);
                
                if (friendDocSnap.exists()) {
                    const friendData = friendDocSnap.data();
                    dailyData[friendUser] = {
                        meals: friendData.meals || {breakfast: [], lunch: [], dinner: [], snack: []},
                        exercises: friendData.exercises || []
                    };
                } else {
                    dailyData[friendUser] = { meals: {breakfast: [], lunch: [], dinner: [], snack: []}, exercises: [] };
                }
                
                updateAllContent();
            } catch (error) {
                console.error('加载历史日期数据失败:', error);
                updateAllContent();
            }
        }

        function initFirebase() {
            const statusEl = document.getElementById('userIdDisplay');
            const loadingStatus = document.getElementById('loadingStatus');
            
            if (!firebaseLoaded) {
                console.warn('Firebase未加载，使用本地模式');
                statusEl.textContent = '离线模式';
                hideLoading();
                
                const savedUser = localStorage.getItem('myLocalUser');
                if (savedUser) {
                    myLocalUser = savedUser;
                    currentUser = savedUser;
                }
                
                setupUserUI();
                updateAllContent();
                return;
            }
            
            statusEl.textContent = '正在登录...';
            
            let loginTimeout = setTimeout(() => {
                if (!currentUid) {
                    console.warn('登录超时');
                    loadingStatus.textContent = '登录超时，请检查网络';
                    hideLoading();
                    
                    setTimeout(() => {
                        if (!currentUid) {
                            const retry = confirm('登录超时，是否重试？');
                            if (retry) {
                                location.reload();
                            } else {
                                statusEl.textContent = '登录超时，请稍后再试';
                                myLocalUser = 'user1';
                                currentUser = 'user1';

        function getDateRange(period) {
            const dates = [];
            const now = new Date();
            let startDate, endDate;
            switch(period) {
                case 'week':
                    const dayOfWeek = now.getDay();
                    const daysSinceMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
                    startDate = new Date(now);
                    startDate.setDate(startDate.getDate() - daysSinceMonday);
                    endDate = new Date(startDate);
                    endDate.setDate(endDate.getDate() + 6);
                    break;
                case 'month':
                    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                    endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                    break;
                case 'year':
                    startDate = new Date(now.getFullYear(), 0, 1);
                    endDate = new Date(now.getFullYear(), 11, 31);
                    break;
            }
            while (startDate <= endDate) {
                dates.push({
                    date: `${startDate.getFullYear()}-${String(startDate.getMonth() + 1).padStart(2, '0')}-${String(startDate.getDate()).padStart(2, '0')}`,
                    label: period === 'week' ? ['日', '一', '二', '三', '四', '五', '六'][startDate.getDay()] : 
                           period === 'month' ? `${startDate.getDate()}日` : `${startDate.getMonth() + 1}月`
                });
                startDate.setDate(startDate.getDate() + 1);
            }
            return dates;
        }

        function compressImage(src, maxWidth, quality) {
            return new Promise((resolve) => {
                const originalSizeKB = Math.round(src.length / 1024);
                if (originalSizeKB <= 200) {
                    console.log(`图片已很小(${originalSizeKB}KB)，不压缩`);
                    resolve(src);
                    return;
                }
                
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedSrc = canvas.toDataURL('image/jpeg', quality);
                    const compressedSizeKB = Math.round(compressedSrc.length / 1024);
                    
                    if (compressedSizeKB < originalSizeKB * 0.9) {
                        console.log(`图片压缩: ${originalSizeKB}KB → ${compressedSizeKB}KB, ${img.width}x${img.height} → ${width}x${height}`);
                        resolve(compressedSrc);
                    } else {
                        console.log(`压缩效果不明显(${compressedSizeKB}KB)，使用原图`);
                        resolve(src);
                    }
                };
                img.onerror = function() {
                    console.error('图片压缩失败，使用原图');
                    resolve(src);
                };
                img.src = src;
            });
        }

        function estimateCaloriesByWeight(name, weight) {
            let calories = 0;
            const text = name.toLowerCase();
            for (let food in foodCalories) {
                if (text.includes(food.toLowerCase())) {
                    calories += foodCalories[food];
                }
            }
            if (calories === 0) calories = 50;
            return Math.round((calories / 100) * weight);
        }

                calories = Math.round((kjPer100g / 100) * weight / 4.184);

        function updateHistory() {

            const dateRangeElement = document.getElementById('historyDateRange');
            if (dates.length > 0) {

                const endDate = dates[dates.length - 1].date;
                dateRangeElement.textContent = `日期范围：${startDate} 至 ${endDate}`;
            }
            
            let totalDays = 0, totalCaloriesIn = 0, totalCaloriesOut = 0;
            const dailyStats = [];
            dates.forEach(dateInfo => {
                const dayData = history.find(h => h.date === dateInfo.date);
                if (dayData) { totalDays++; totalCaloriesIn += dayData.caloriesIn; totalCaloriesOut += dayData.caloriesOut; }
                dailyStats.push({ date: dateInfo.date, label: dateInfo.label, caloriesIn: dayData ? dayData.caloriesIn : 0 });
            });
            
            const avgNetCalories = totalDays > 0 ? Math.round((totalCaloriesIn - totalCaloriesOut) / totalDays) : 0;
            document.getElementById('historyDays').textContent = totalDays;
            document.getElementById('historyCaloriesIn').textContent = totalCaloriesIn;
            document.getElementById('historyCaloriesOut').textContent = totalCaloriesOut;
            document.getElementById('historyNetAvg').textContent = avgNetCalories;
            
            updateChart(dailyStats);
            updateDetailList(history, dates);

            chartContainer.innerHTML = `<div class="chart-bars">${dailyStats.map(day => `
                <div class="chart-bar" style="height: ${(day.caloriesIn / maxValue) * 100}%">

                    <span class="detail-date">${dateObj.getMonth() + 1}月${dateObj.getDate()}日 (周${weekDay})</span>
                    <div class="detail-calories">
                        <span>摄入: ${day.caloriesIn}千卡</span>
                        <span>消耗: ${day.caloriesOut}千卡</span>
                    </div>
                </div>`;
            }).join('');
        }

        function saveToHistory() {
            const saveDate = selectedDate;
            const meals = dailyData[currentUser].meals;
            const exercises = dailyData[currentUser].exercises;
            
            let caloriesIn = 0;
            Object.values(meals).forEach(mealList => mealList.forEach(meal => caloriesIn += meal.calories));
            let caloriesOut = 0;
            exercises.forEach(exercise => caloriesOut += exercise.calories);
            
            const existingIndex = historyData[currentUser].findIndex(h => h.date === saveDate);
            const dayData = { date: saveDate, caloriesIn: caloriesIn, caloriesOut: caloriesOut, meals: JSON.parse(JSON.stringify(meals)), exercises: JSON.parse(JSON.stringify(exercises)) };
            
            if (existingIndex >= 0) {
                historyData[currentUser][existingIndex] = dayData;
            } else {
                historyData[currentUser].push(dayData);
            }
            
            saveToFirestore();
        }

        async function saveToFirestore() {
            if (!db || !currentUid) return;
            if (isReadOnlyMode) return;
            try {
                const saveDate = selectedDate;
                const meals = dailyData[currentUser].meals;
                const exercises = dailyData[currentUser].exercises;
                
                let caloriesIn = 0;
                Object.values(meals).forEach(mealList => mealList.forEach(meal => caloriesIn += meal.calories));
                let caloriesOut = 0;
                exercises.forEach(exercise => caloriesOut += exercise.calories);
                
                const today = getTodayString();
                if (saveDate === today) {
                    await setDoc(doc(db, 'users', `${currentUid}_${currentUser}`), {
                        dailyData: dailyData[currentUser],
                        userName: document.getElementById(currentUser === 'user1' ? 'user1Name' : 'user2Name')?.value || currentUser,
                        uid: currentUid,
                        localUser: currentUser,
                        lastUpdated: new Date()
                    }, { merge: true });
                }
                
                await setDoc(doc(db, 'history', `${currentUid}_${currentUser}_${saveDate}`), {
                    date: saveDate,
                    caloriesIn: caloriesIn,
                    caloriesOut: caloriesOut,
                    meals: dailyData[currentUser].meals,
                    exercises: dailyData[currentUser].exercises,
                    uid: currentUid,
                    localUser: currentUser,
                    createdAt: new Date()
                });
                
                let existing = historyData[currentUser].find(h => h.date === saveDate);
                if (existing) {
                    existing.caloriesIn = caloriesIn;
                    existing.caloriesOut = caloriesOut;
                    existing.meals = JSON.parse(JSON.stringify(meals));
                    existing.exercises = JSON.parse(JSON.stringify(exercises));
                } else {
                    historyData[currentUser].push({
                        date: saveDate,
                        caloriesIn: caloriesIn,
                        caloriesOut: caloriesOut,
                        meals: JSON.parse(JSON.stringify(meals)),
                        exercises: JSON.parse(JSON.stringify(exercises))
                    });
                }
                
                console.log(`数据已同步到Firestore (${saveDate})`);
            } catch (error) {
                console.error('保存到Firestore失败:', error);
            }
        }

        async function loadFromFirestore() {
            if (!db || !currentUid) { console.log('Firebase未初始化或未登录，使用本地数据'); return; }
            try {
                const userDocRef = doc(db, 'users', `${currentUid}_${currentUser}`);
                const userDoc = await getDoc(userDocRef);
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.dailyData) { dailyData[currentUser] = data.dailyData; console.log('从Firestore加载每日数据成功'); }
                    if (data.userName) {
                        const nameInput = document.getElementById(currentUser === 'user1' ? 'user1Name' : 'user2Name');
                        if (nameInput) nameInput.value = data.userName;
                    }
                }
                
                const historyQuery = query(collection(db, 'history'), where('uid', '==', currentUid), where('localUser', '==', currentUser));
                const historySnapshot = await getDocs(historyQuery);
                
                const cloudHistory = [];
                historySnapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    cloudHistory.push({ date: data.date, caloriesIn: data.caloriesIn, caloriesOut: data.caloriesOut, meals: data.meals, exercises: data.exercises });
                });
                
                if (cloudHistory.length > 0) { historyData[currentUser] = cloudHistory; console.log('从Firestore加载历史数据成功'); }
                updateAllContent();
            } catch (error) {
                console.error('从Firestore加载数据失败:', error);
            }
        }

        function updateAllContent() {
            updateMealContent();
            updateExerciseContent();
            updateSummary();
            updateFriendContent();
            updateHistory();
        }

            if (e.target.classList.contains('modal')) e.target.style.display = 'none';

        function addSampleHistoryData() {
            const now = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                historyData.user1.push({ date: dateStr, caloriesIn: 1500 + Math.floor(Math.random() * 500), caloriesOut: 300 + Math.floor(Math.random() * 400), meals: {}, exercises: [] });
                historyData.user2.push({ date: dateStr, caloriesIn: 1400 + Math.floor(Math.random() * 400), caloriesOut: 250 + Math.floor(Math.random() * 350), meals: {}, exercises: [] });
            }
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
            while (firstDay < now) {
                const dateStr = `${firstDay.getFullYear()}-${String(firstDay.getMonth() + 1).padStart(2, '0')}-${String(firstDay.getDate()).padStart(2, '0')}`;
                if (!historyData.user1.some(h => h.date === dateStr)) {
                    historyData.user1.push({ date: dateStr, caloriesIn: 1400 + Math.floor(Math.random() * 600), caloriesOut: 200 + Math.floor(Math.random() * 500), meals: {}, exercises: [] });
                    historyData.user2.push({ date: dateStr, caloriesIn: 1300 + Math.floor(Math.random() * 500), caloriesOut: 180 + Math.floor(Math.random() * 450), meals: {}, exercises: [] });
                }
                firstDay.setDate(firstDay.getDate() + 1);
            }
            updateHistory();
        }
